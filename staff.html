<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة العاملين — مجمع تحفيظ القرآن</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#1a3c5e;--primary-light:#2563a8;--accent:#c8a84b;--accent-light:#f0d080;
  --surface:#f4f2ec;--surface-2:#fff;--text-main:#1a1a2e;--text-muted:#5a6a7a;
  --border:#ddd5c0;--success:#1e7e4a;--danger:#c0392b;--warning:#d4890a;
  --radius:14px;--shadow:0 4px 24px rgba(26,60,94,.10);--shadow-lg:0 12px 40px rgba(26,60,94,.16);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',sans-serif;background:var(--surface);color:var(--text-main);min-height:100vh;direction:rtl;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 10% 0%,rgba(26,60,94,.07) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 90% 100%,rgba(200,168,75,.06) 0%,transparent 55%);pointer-events:none;z-index:0;}

/* ══ هيدر ══ */
.site-header{background:var(--primary);position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.18);}
.header-inner{display:flex;align-items:center;gap:16px;padding:14px 24px;max-width:1200px;margin:0 auto;}
.header-logo{width:48px;height:48px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-logo i{font-size:22px;color:var(--primary);}
.header-title h1{font-size:18px;font-weight:800;color:#fff;line-height:1.2;}
.header-title p{font-size:12px;color:rgba(255,255,255,.65);margin:0;}
.header-right{margin-right:auto;display:flex;align-items:center;gap:12px;}
.user-chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:#fff;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px;}
.user-chip .role-badge{background:var(--accent);color:var(--primary);padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;}
.btn-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);padding:6px 14px;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;}
.btn-logout:hover{background:rgba(255,255,255,.2);}

/* ══ شاشة الدخول ══ */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#1a3c5e 0%,#2563a8 100%);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.login-card{background:#fff;border-radius:20px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.25);text-align:center;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275);}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.login-logo{width:72px;height:72px;background:linear-gradient(135deg,#c8a84b,#f0d080);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 8px 24px rgba(200,168,75,.3);}
.login-logo i{font-size:32px;color:var(--primary);}
.login-card h2{font-size:22px;font-weight:800;color:var(--primary);margin-bottom:6px;}
.login-card p{font-size:13px;color:var(--text-muted);margin-bottom:28px;}
.login-input{width:100%;border:2px solid var(--border);border-radius:12px;padding:14px 18px;font-family:'Tajawal',sans-serif;font-size:18px;text-align:center;letter-spacing:6px;color:var(--primary);font-weight:700;margin-bottom:16px;transition:border-color .2s;}
.login-input:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(37,99,168,.12);}
.btn-login{width:100%;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;border-radius:12px;padding:14px;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,60,94,.3);}
.login-error{color:var(--danger);font-size:13px;margin-top:8px;display:none;}

/* ══ تخطيط رئيسي ══ */
#appScreen{display:none;}
.app-layout{display:flex;min-height:calc(100vh - 76px);position:relative;z-index:1;}

/* شريط جانبي */
.sidebar{width:230px;background:var(--surface-2);border-left:1px solid var(--border);flex-shrink:0;overflow-y:auto;transition:transform .3s;}
@media(max-width:900px){
  .sidebar{position:fixed;top:76px;right:0;height:calc(100vh - 76px);z-index:160;transform:translateX(100%);box-shadow:-4px 0 20px rgba(0,0,0,.15);}
  .sidebar.open{transform:translateX(0);}
  #hambBtn{display:flex !important;}
  #sidebarOverlay.show{display:block !important;}
  .main-content{padding:14px !important;}
}
.sidebar-section{padding:0 12px;margin-bottom:6px;}
.sidebar-label{font-size:10.5px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px 4px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;transition:all .2s;font-size:13.5px;font-weight:600;color:var(--text-muted);position:relative;}
.nav-item:hover{background:var(--surface);color:var(--primary);}
.nav-item.active{background:linear-gradient(135deg,rgba(26,60,94,.1),rgba(37,99,168,.08));color:var(--primary);}
.nav-item.active::before{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--primary);border-radius:2px;}
.nav-item i{width:18px;text-align:center;font-size:14px;}
.nav-badge{margin-right:auto;background:var(--danger);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700;}

/* محتوى رئيسي */
.main-content{flex:1;padding:20px 24px;overflow-x:hidden;overflow-y:auto;max-width:100%;}

/* ══ KPI Cards ══ */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:28px;}
.kpi-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:default;}
.kpi-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);}
.kpi-card:hover .bg-icon-float{transform:scale(1.18) rotate(8deg);}
.bg-icon-float{position:absolute;left:-8px;bottom:-10px;font-size:64px;opacity:.06;color:var(--primary);transition:transform .35s ease;pointer-events:none;}
.kpi-card .kpi-label{font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.kpi-card .kpi-val{font-size:32px;font-weight:800;color:var(--primary);line-height:1;}
.kpi-card .kpi-sub{font-size:12px;color:var(--text-muted);margin-top:6px;}
.kpi-card.kpi-success .kpi-val{color:var(--success);}
.kpi-card.kpi-danger  .kpi-val{color:var(--danger);}
.kpi-card.kpi-warning .kpi-val{color:var(--warning);}
.kpi-card.kpi-accent  .kpi-val{color:#8b5e0a;}

/* ══ بطاقة محتوى ══ */
.content-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
.card-header-bar{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:#fafaf8;}
.card-header-bar h3{font-size:15px;font-weight:700;color:var(--primary);margin:0;}
.card-header-bar .card-actions{margin-right:auto;display:flex;gap:8px;flex-wrap:wrap;}
.card-body{padding:24px;}

/* ══ جداول ══ */
.data-table{width:100%;border-collapse:collapse;font-size:13.5px;}
.data-table th{background:#f4f2ec;color:var(--text-muted);font-weight:700;font-size:12px;padding:10px 14px;text-align:right;border-bottom:2px solid var(--border);white-space:nowrap;}
.data-table td{padding:11px 14px;border-bottom:1px solid #f0ece0;vertical-align:middle;}
.data-table tr:hover td{background:#fafaf8;}
.data-table tr:last-child td{border-bottom:none;}

/* ══ حالات وشارات ══ */
.badge-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11.5px;font-weight:700;}
.bp-success{background:#eafaf1;color:var(--success);}
.bp-danger {background:#fdf0ef;color:var(--danger);}
.bp-warning{background:#fff8e6;color:var(--warning);}
.bp-info   {background:#eef3ff;color:var(--primary-light);}
.bp-gray   {background:#f0f0f0;color:#666;}

/* ══ فلاتر ══ */
.filters-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
.filter-input{border:1.5px solid var(--border);border-radius:9px;padding:8px 13px;font-family:'Tajawal',sans-serif;font-size:13.5px;background:#fafaf8;color:var(--text-main);transition:border-color .2s;}
.filter-input:focus{outline:none;border-color:var(--primary-light);}
.filter-input.search-box{min-width:200px;}

/* ══ تبويبات ثانوية ══ */
.sub-tabs{display:flex;border-bottom:2px solid var(--border);gap:2px;margin-bottom:20px;overflow-x:auto;}
.sub-tab{padding:10px 18px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;color:var(--text-muted);background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.sub-tab:hover{color:var(--primary);}
.sub-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.sub-panel{display:none;}
.sub-panel.active{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ══ أزرار ══ */
.btn-p{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;border-radius:9px;padding:9px 20px;font-family:'Tajawal',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(26,60,94,.25);}
.btn-o{background:transparent;color:var(--primary);border:1.5px solid var(--primary);border-radius:9px;padding:8px 16px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-o:hover{background:var(--primary);color:#fff;}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:7px;}
.btn-success{background:var(--success);color:#fff;border:none;border-radius:7px;padding:5px 12px;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.btn-danger{background:var(--danger);color:#fff;border:none;border-radius:7px;padding:5px 12px;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.btn-warning{background:var(--warning);color:#fff;border:none;border-radius:7px;padding:5px 12px;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.btn-wa{background:#25D366;color:#fff;border:none;border-radius:7px;padding:5px 12px;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}

/* ══ ترقيم صفحات ══ */
.pagination-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 0;font-size:13px;color:var(--text-muted);}
.page-btns{display:flex;gap:6px;}
.page-btn{width:32px;height:32px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface-2);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;color:var(--text-muted);transition:all .15s;display:flex;align-items:center;justify-content:center;}
.page-btn:hover,.page-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;}

/* ══ تفاصيل الطالب ══ */
.student-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.detail-field{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:11px 14px;}
.detail-field .df-lbl{font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px;}
.detail-field .df-val{font-size:14px;font-weight:700;color:var(--text-main);}

/* ══ إنذارات ══ */
.warn-card{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:12px;display:flex;align-items:flex-start;gap:14px;transition:box-shadow .2s;}
.warn-card:hover{box-shadow:var(--shadow);}
.warn-icon{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.wi-edu  {background:#fdf0ef;color:var(--danger);}
.wi-late {background:#fff3e0;color:#e65100;}
.wi-abs  {background:#fff8e6;color:var(--warning);}
.wi-excused{background:#e8f5e9;color:#2e7d32;}
.warn-body{flex:1;min-width:0;}
.warn-body h4{font-size:14px;font-weight:700;margin-bottom:4px;}
.warn-body p{font-size:12.5px;color:var(--text-muted);line-height:1.5;}
.warn-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}

/* ══ spinner ══ */
.spinner-overlay{position:fixed;inset:0;background:rgba(255,255,255,.8);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px);}
.spinner-ring{width:56px;height:56px;border:4px solid #e0d8c8;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-overlay p{color:var(--primary);font-size:15px;font-weight:600;}

/* ══ حالة فارغة ══ */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);}
.empty-state i{font-size:44px;margin-bottom:14px;opacity:.3;color:var(--primary);display:block;}
.empty-state h3{font-size:15px;font-weight:700;margin-bottom:6px;color:var(--text-main);}

/* ══ section title ══ */
.section-title{font-size:16px;font-weight:800;color:var(--primary);margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* ══ responsive ══ */
@media(max-width:900px){
  .sidebar{position:fixed;top:76px;right:0;height:calc(100vh - 76px);z-index:160;transform:translateX(100%);box-shadow:-4px 0 20px rgba(0,0,0,.15);}
  .sidebar.open{transform:translateX(0);}
  .main-content{padding:16px;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .student-detail-grid{grid-template-columns:1fr;}
  .filters-bar{flex-direction:column;align-items:stretch;}
  .data-table{font-size:12px;}
  .data-table th,.data-table td{padding:8px 10px;}
}
@media(max-width:480px){.kpi-grid{grid-template-columns:1fr;}}

.swal-rtl{direction:rtl;font-family:'Tajawal',sans-serif!important;}
.swal2-input,.swal2-select,.swal2-textarea{font-family:'Tajawal',sans-serif!important;}
</style>
</head>
<body>

<!-- ══ شاشة الدخول ══ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><i class="fas fa-book-open-reader"></i></div>
    <h2>بوابة العاملين</h2>
    <p>مجمع تحفيظ القرآن الكريم<br>أدخل رمز الدخول الخاص بك</p>
    <input class="login-input" type="password" id="loginCode" placeholder="● ● ● ●" maxlength="10"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()"><i class="fas fa-right-to-bracket me-2"></i>دخول</button>
    <div class="login-error" id="loginError"><i class="fas fa-circle-xmark me-1"></i>رمز الدخول غير صحيح</div>
    <div style="margin-top:20px;display:flex;justify-content:center;gap:20px">
      <a href="index.html" style="font-size:12.5px;color:var(--text-muted);text-decoration:none;display:flex;align-items:center;gap:5px"><i class="fas fa-home fa-xs"></i> الرئيسية</a>
      <a href="register.html" style="font-size:12.5px;color:var(--text-muted);text-decoration:none;display:flex;align-items:center;gap:5px"><i class="fas fa-user-plus fa-xs"></i> تسجيل طالب</a>
    </div>
  </div>
</div>

<!-- ══ هيدر ══ -->
<header class="site-header" id="appHeader" style="display:none;">
  <div class="header-inner">
    <button style="display:none;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;width:36px;height:36px;border-radius:8px;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;margin-left:4px" id="hambBtn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    <div class="header-logo"><i class="fas fa-book-open-reader"></i></div>
    <div class="header-title">
      <h1>مجمع تحفيظ القرآن الكريم</h1>
      <p>منظومة الإدارة الرقمية المتكاملة</p>
    </div>
    <div class="header-right">
      <div class="user-chip">
        <i class="fas fa-user-circle"></i>
        <span id="headerUserName">—</span>
        <span class="role-badge" id="headerRole">—</span>
      </div>
      <button class="btn-logout" onclick="doLogout()"><i class="fas fa-right-from-bracket me-1"></i>خروج</button>
    </div>
  </div>
</header>

<!-- ══ تطبيق رئيسي ══ -->
<div id="appScreen">
<div class="app-layout">

  <!-- شريط جانبي -->
  <nav class="sidebar" id="sidebarNav"></nav>

  <!-- محتوى -->
  <main class="main-content" id="mainContent">
    <div class="empty-state" style="padding:80px 20px;">
      <i class="fas fa-hand-point-right" style="opacity:.2;font-size:48px;display:block;margin-bottom:16px;"></i>
      <h3>اختر من القائمة الجانبية</h3>
    </div>
  </main>
</div>
</div>

<!-- spinner -->
<div class="spinner-overlay" id="spinnerOverlay" style="display:none;">
  <div class="spinner-ring"></div>
  <p id="spinnerText">جارٍ التحميل…</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
// ══════════════════════════════════════════════════
const API = 'https://script.google.com/macros/s/AKfycbyfNLsP39SOzW1egWRWBG3OPEXUUJHxqZqa3yylzSY2hY_Dw_YOK9_W_-_iRFF-feUJFw/exec';

let currentUser = null;
let allStudents = [];
let studentsPage = 1;
const PAGE_SIZE = 50;

const GRADES = {
  'ابتدائي':['الأول الابتدائي','الثاني الابتدائي','الثالث الابتدائي','الرابع الابتدائي','الخامس الابتدائي','السادس الابتدائي'],
  'متوسط':['الأول المتوسط','الثاني المتوسط','الثالث المتوسط'],
  'ثانوي':['الأول الثانوي','الثاني الثانوي','الثالث الثانوي'],
  'جامعي':['السنة الأولى','السنة الثانية','السنة الثالثة','السنة الرابعة','أكثر من أربع سنوات'],
};

// ══ API Helper ══
async function api(action, data={}) {
  const r = await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action,data})});
  return r.json();
}
function spin(show,txt='جارٍ التحميل…'){
  document.getElementById('spinnerOverlay').style.display=show?'flex':'none';
  document.getElementById('spinnerText').textContent=txt;
}
function fmtDate(d){
  if(!d)return'—';
  try{return new Date(d).toLocaleDateString('ar-SA',{year:'numeric',month:'short',day:'numeric'});}
  catch{return String(d).split('T')[0];}
}
function whatsapp(phone,msg=''){
  const p=String(phone||'').replace(/\D/g,'');
  const intl=p.startsWith('0')?'966'+p.slice(1):p;
  window.open('https://wa.me/'+intl+(msg?'?text='+encodeURIComponent(msg):''),'_blank');
}
function buildMsg(template, vars){
  let t=template||'';
  Object.entries(vars).forEach(([k,v])=>{t=t.replaceAll('#'+k,v||'');});
  return t;
}
function hijriDate(){
  return new Date().toLocaleDateString('ar-SA-u-ca-islamic',{year:'numeric',month:'long',day:'numeric'});
}

// ══ جوال: شريط جانبي ══
function toggleSidebar(){
  const s=document.getElementById('sidebarNav');
  const o=document.getElementById('sidebarOverlay');
  s.classList.toggle('open'); o.classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebarNav')?.classList.remove('open');
  document.getElementById('sidebarOverlay')?.classList.remove('show');
}

// ══ دخول ══
async function doLogin(){
  const code=document.getElementById('loginCode').value.trim();
  if(!code)return;
  const btn=document.getElementById('btnLogin');
  btn.disabled=true; btn.innerHTML='<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:6px"></span> جارٍ التحقق…';
  try{
    const r=await api('تحقق_رمز_دخول',{رمز_الدخول:code});
    spin(false);
    if(r.نجاح){
      currentUser=r.عامل;
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('appHeader').style.display='block';
      document.getElementById('appScreen').style.display='block';
      document.getElementById('headerUserName').textContent=currentUser['الاسم']||'—';
      document.getElementById('headerRole').textContent=roleLabel(currentUser['الوظيفة']);
      buildSidebar();
      loadFirstPage();
    } else {
      document.getElementById('loginError').style.display='block';
      setTimeout(()=>document.getElementById('loginError').style.display='none',3000);
    }
  } catch(e){spin(false);alert('خطأ في الاتصال');}
}
function doLogout(){ window.location.href='index.html'; }
function roleLabel(r){
  return r==='مشرف_اداري'?'مشرف إداري':r==='مشرف_تعليمي'?'مشرف تعليمي':r==='معلم'?'معلم':'—';
}

async function prefetchAdminData(){
  // fix #2: جلب البيانات الأساسية للمشرف الإداري (ما عدا المرفوضين)
  try {
    const [rS,rC,rSt,rReq,rEdit,rEduW,rTpls,rKpi]=await Promise.all([
      api('جلب_الطلاب',{حجم_الصفحة:PAGE_SIZE,الصفحة:1}),
      api('جلب_الحلق',{}),
      api('جلب_حالات_الطالب',{}),
      api('جلب_طلبات_التسجيل',{}),
      api('جلب_طلبات_التعديل',{}),
      api('جلب_الانذارات_التعليمية',{غير_مكتملة_فقط:true}),
      api('جلب_قوالب_الرسائل',{}),
      api('جلب_تقارير_مشرف_اداري',{}),
    ]);
    allStudents=rS.طلاب||[];
    window._studentsCircles=(rC.حلق||[]).map(h=>h['اسم_الحلقة']);
    window._studentsStatuses=(rSt.حالات||[]).map(h=>h['اسم_الحالة']);
    const allReqs=rReq.طلبات||[];
    window._cachedRequests={
      جديد:allReqs.filter(ط=>ط['حالة_الطلب']==='جديد'),
      انتظار:allReqs.filter(ط=>ط['حالة_الطلب']==='انتظار'),
      تعديلات:rEdit.طلبات||[],
    };
    window._cachedEduWarnings=rEduW.انذارات||[];
    window._cachedTemplates=rTpls.قوالب||[];
    window._cachedKpi=rKpi.تقارير||{};
  } catch(e){ console.error('prefetch error:', e); }
}

function loadFirstPage(){
  const role=currentUser['الوظيفة'];
  if(role==='معلم') loadPage('teacherStudents');
  else if(role==='مشرف_تعليمي') loadPage('eduKpi');
  else if(role==='مشرف_اداري'){
    spin(true,'جارٍ تحضير البيانات…');
    prefetchAdminData().then(()=>{ spin(false); loadPage('adminKpi'); });
  }
  else if(role==='مدير') loadPage('directorDashboard');
}

}

async function loadPage(page){
  // mark active
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.toggle('active', n.getAttribute('onclick')===`loadPage('${page}')`);
  });

  const mc=document.getElementById('mainContent');
  mc.innerHTML=`<div class="empty-state"><div class="spinner-ring" style="margin:0 auto 12px"></div><p>جارٍ التحميل…</p></div>`;

  if(page==='teacherStudents') await renderTeacherStudents();
  else if(page==='teacherKpi')  await renderTeacherKpi();
  else if(page==='eduKpi')      await renderEduKpi();
  else if(page==='eduWarnings') await renderEduWarnings();
  else if(page==='eduAllStudents') await renderEduAllStudents();
  else if(page==='adminKpi')    await renderAdminKpi();
  else if(page==='adminStudents') await renderAdminStudents();
  else if(page==='adminRequests') await renderAdminRequests();
  else if(page==='adminEduWarnings') await renderAdminEduWarnings();
  else if(page==='adminAdmWarnings') await renderAdminAdmWarnings();
  else if(page==='adminAllWarnings') await renderAdminAllWarnings();
  else if(page==='settings')    await renderSettings();
}

function filterTeacherTable(q){
  document.querySelectorAll('#teacherTable tbody tr').forEach(tr=>{

}

async function openStudentNote(ط){
  const {value:note,isConfirmed}=await Swal.fire({
    title:'ملاحظة على: '+ط['اسم_الطالب'],
    html:`<textarea id="noteInput" class="swal2-textarea" style="font-family:Tajawal;direction:rtl;height:120px"
      placeholder="اكتب ملاحظتك هنا… (تظهر للمعلم والمشرف الإداري فقط)">${ط['ملاحظات']||''}</textarea>`,
    confirmButtonText:'حفظ الملاحظة',
    cancelButtonText:'إلغاء',
    showCancelButton:true,
    confirmButtonColor:'#1a3c5e',
    customClass:{popup:'swal-rtl'},
    preConfirm:()=>document.getElementById('noteInput').value.trim(),
  });
  if(!isConfirmed)return;
  spin(true,'جارٍ الحفظ…');
  const r=await api('حفظ_ملاحظة_معلم',{رقم_الطالب:ط['رقم_الطالب'],ملاحظة:note});
  spin(false);
  if(r.نجاح) Swal.fire({icon:'success',title:'تم الحفظ',timer:2000,timerProgressBar:true,showConfirmButton:false});
}

function renderEduWarnCards(list,إجراءات,tplS,tplP){
  if(!list.length) return `<div class="empty-state"><i class="fas fa-check-circle" style="color:var(--success)"></i><h3>لا توجد إنذارات مفتوحة</h3></div>`;
  return list.map(ا=>`
    <div class="warn-card" id="wc_${ا['رقم_الانذار']}">
      <div class="warn-icon wi-edu"><i class="fas fa-triangle-exclamation"></i></div>
      <div class="warn-body">
        <h4>${ا['اسم_الطالب']||'—'} <span style="font-weight:400;font-size:12px;color:var(--text-muted)">· ${ا['الحلقة']||'—'}</span></h4>
        <p><i class="fas fa-circle-exclamation fa-xs me-1"></i>${ا['سبب_الانذار']||'—'}<br>
        <i class="fas fa-calendar fa-xs me-1"></i>${fmtDate(ا['تاريخ_الإصدار'])} · الإجراء: <strong>${ا['حالة_الإجراء']||'بانتظار الإجراء'}</strong></p>
      </div>
      <div class="warn-actions">
        <select class="filter-input btn-sm" id="proc_${ا['رقم_الانذار']}" style="font-size:12px;padding:5px 10px">
          <option value="">تحديث الإجراء</option>
          ${إجراءات.map(إ=>`<option value="${إ['اسم_الاجراء']}">${إ['اسم_الاجراء']}</option>`).join('')}
          <option value="__done__">✓ اكتمل الإجراء</option>
        </select>
        <button class="btn-p btn-sm" onclick="updateEduProc('${ا['رقم_الانذار']}')"><i class="fas fa-save"></i> حفظ</button>
        ${ا['رقم_جوال_الطالب']?`<button class="btn-wa btn-sm" onclick='sendWa("${ا['رقم_جوال_الطالب']}","${ا['اسم_الطالب']}","${ا['اسم_ولي_الامر']||''}","${ا['سبب_الانذار']||''}",true)'><i class="fab fa-whatsapp"></i> طالب</button>`:''}
        ${ا['رقم_جوال_ولي_الامر']?`<button class="btn-wa btn-sm" onclick='sendWa("${ا['رقم_جوال_ولي_الامر']}","${ا['اسم_الطالب']}","${ا['اسم_ولي_الامر']||''}","${ا['سبب_الانذار']||''}",false)'><i class="fab fa-whatsapp"></i> ولي الأمر</button>`:''}
        ${ا['رقم_جوال_ولي_الامر']?`<button class="btn-wa btn-sm" onclick='sendWa("${ا['رقم_جوال_ولي_الامر']}","${ا['اسم_الطالب']}","${ا['اسم_ولي_الامر']||''}","${ا['سبب_الانذار']||''}",false)'><i class="fab fa-whatsapp"></i> ولي الأمر</button>`:''}
      </div>
    </div>`).join('');
}

function filterEduWarnings(){
  const حلقة=document.getElementById('filterEduCircle')?.value||'';
  const q=document.getElementById('filterEduSearch')?.value||'';
  let list=window._eduWarnings||[];
  if(حلقة) list=list.filter(ا=>ا['الحلقة']===حلقة);
  if(q)    list=list.filter(ا=>String(ا['اسم_الطالب']).includes(q));
  document.getElementById('eduWarnList').innerHTML=renderEduWarnCards(list,window._eduProc,window._tplStudent,window._tplParent);
}

async function issueEduWarning(){
  const name=document.getElementById('newWarnStudent').value.trim();
  const circle=document.getElementById('newWarnCircle').value;
  const reason=document.getElementById('newWarnReason').value.trim();
  if(!name||!reason){Swal.fire({icon:'warning',title:'تنبيه',text:'يرجى إدخال اسم الطالب وسبب الإنذار',confirmButtonColor:'#1a3c5e',customClass:{popup:'swal-rtl'}});return;}
  spin(true,'جارٍ الإصدار…');
  const r=await api('إصدار_إنذار_تعليمي',{اسم_الطالب:name,الحلقة:circle,سبب_الانذار:reason,اسم_المشرف:currentUser['الاسم']});
  spin(false);
  if(r.نجاح){Swal.fire({icon:'success',title:'تم الإصدار',text:r.رقم_الانذار,timer:2500,timerProgressBar:true,showConfirmButton:false,customClass:{popup:'swal-rtl'}});renderEduWarnings();}
}

async function updateEduProc(id){
  const selId='proc_'+id||'admp_'+id;
  const sel=document.getElementById('proc_'+id)||document.getElementById('admp_'+id);
  const val=sel?.value;if(!val){Swal.fire({icon:'warning',title:'اختر إجراءً',confirmButtonColor:'#1a3c5e',customClass:{popup:'swal-rtl'}});return;}
  const done=val==='__done__';
  if(done) document.getElementById('wc_'+id)?.remove();
  spin(true,'جارٍ الحفظ…');
  const r=await api('تحديث_إجراء_انذار_تعليمي',{رقم_الانذار:id,الإجراء:done?'مكتمل':val,مكتمل:done});
  spin(false);
  if(r.نجاح){if(sel&&!done)sel.value='';Swal.fire({icon:'success',title:'تم التحديث',timer:1500,timerProgressBar:true,showConfirmButton:false});}
}

function sendWa(phone,studentName,parentName,reason,isStudent){
  const tpl=isStudent?window._tplStudent:window._tplParent;
  const msg=buildMsg(tpl?.['نص_القالب']||'',{اسم_الطالب:studentName,اسم_ولي_الطالب:parentName,السبب:reason,تاريخ:hijriDate()});
  whatsapp(phone,msg);
}

async function reloadAdminStudents(){
  const data={
    بحث:document.getElementById('filterStudName')?.value||'',
    الحلقة:document.getElementById('filterStudCircle')?.value||'',
    حالة_الطالب:document.getElementById('filterStudStatus')?.value||'',
    حجم_الصفحة:PAGE_SIZE, الصفحة:studentsPage,
  };
  const min=document.getElementById('filterHifzMin')?.value;
  const max=document.getElementById('filterHifzMax')?.value;
  if(min) data.حفظ_اكثر_من=min;
  if(max) data.حفظ_اقل_من=max;
  spin(true);
  const r=await api('جلب_الطلاب',data);
  spin(false);
  allStudents=r.طلاب||[];
  document.getElementById('studentsBody').innerHTML=buildStudentsRows(allStudents);
  document.getElementById('pageInfo').textContent=`الصفحة ${studentsPage} من ${r.عدد_الصفحات} · إجمالي ${r.المجموع}`;
  document.getElementById('pageBtns').innerHTML=buildPageBtns(studentsPage,r.عدد_الصفحات||1);
}

function buildPageBtns(cur,total){
  let h='';
  const show=(p)=>h+=`<button class="page-btn ${p===cur?'active':''}" onclick="gotoPage(${p})">${p}</button>`;
  if(total<=7){for(let i=1;i<=total;i++)show(i);}
  else{
    show(1);
    if(cur>3) h+=`<span class="page-btn" style="cursor:default">…</span>`;
    for(let i=Math.max(2,cur-1);i<=Math.min(total-1,cur+1);i++) show(i);
    if(cur<total-2) h+=`<span class="page-btn" style="cursor:default">…</span>`;
    show(total);
  }
  return h;
}

async function gotoPage(p){studentsPage=p; await reloadAdminStudents();}

function toggleSelectAll(cb){
  document.querySelectorAll('.stud-chk').forEach(c=>{c.checked=cb.checked; toggleStudentSelect(c);});
}
function toggleStudentSelect(cb){
  if(!window._selectedStudents) window._selectedStudents=new Set();
  if(cb.checked) window._selectedStudents.add(cb.value);
  else window._selectedStudents.delete(cb.value);
}

async function exportStudentsCSV(){
  spin(true,'جارٍ التصدير…');
  const r=await api('تصدير_الطلاب_csv',{});
  spin(false);
  if(r.csv){
    const blob=new Blob(['\uFEFF'+r.csv],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='students_'+Date.now()+'.csv';

    let h='';

      h+=`<button class="btn-success btn-sm" onclick="acceptReg('${ط['رقم_الطلب']}','${ط['اسم_الطالب']}')"><i class="fas fa-check"></i> قبول</button> `;

async function acceptReg(id,name){
  const حلق=(window._studentsCircles||[]);
  let حلق_opts='';
  if(!حلق.length){const r=await api('جلب_الحلق',{});حلق_opts=(r.حلق||[]).map(h=>`<option>${h['اسم_الحلقة']}</option>`).join('');}
  else حلق_opts=حلق.map(h=>`<option>${h}</option>`).join('');

  const {isConfirmed,value}=await Swal.fire({
    title:'قبول: '+name,
    html:`<p style="font-size:13px;color:#5a6a7a;margin-bottom:12px">حدّد الحلقة التي سيُسكَّن فيها الطالب</p>
      <select id="acceptCircle" class="swal2-select" style="font-family:Tajawal"><option value="">-- اختر الحلقة --</option>${حلق_opts}</select>`,
    confirmButtonText:'تأكيد القبول',
    cancelButtonText:'إلغاء',
    showCancelButton:true,
    confirmButtonColor:'#1e7e4a',
    customClass:{popup:'swal-rtl'},
    preConfirm:()=>{const v=document.getElementById('acceptCircle').value;if(!v)return Swal.showValidationMessage('يجب اختيار حلقة');return v;}
  });
  if(!isConfirmed||!value)return;
  spin(true,'جارٍ قبول الطالب…');
  const r=await api('قبول_طلب_تسجيل',{رقم_الطلب:id,الحلقة:value});
  spin(false);
  if(r.نجاح){Swal.fire({icon:'success',title:'تم القبول!',text:'رقم الطالب: '+r.رقم_الطالب,confirmButtonColor:'#1a3c5e',customClass:{popup:'swal-rtl'}});renderAdminRequests();}
  else Swal.fire({icon:'error',title:'خطأ',text:r.خطأ,confirmButtonColor:'#1a3c5e',customClass:{popup:'swal-rtl'}});
}

async function waitReg(id){ api('تحويل_للانتظار',{رقم_الطلب:id}); Swal.fire({icon:'info',title:'تم التحويل للانتظار',timer:1500,timerProgressBar:true,showConfirmButton:false}); renderAdminRequests(); }

async function rejectReg(id){
  const {isConfirmed,value}=await Swal.fire({
    title:'سبب الرفض',
    input:'textarea',
    inputPlaceholder:'اكتب سبب الرفض…',
    inputAttributes:{style:'font-family:Tajawal;direction:rtl'},
    confirmButtonText:'تأكيد الرفض',
    cancelButtonText:'إلغاء',
    showCancelButton:true,
    confirmButtonColor:'#c0392b',
    customClass:{popup:'swal-rtl'},
    preConfirm:v=>{if(!v||!v.trim())return Swal.showValidationMessage('يجب إدخال سبب الرفض');return v.trim();}
  });
  if(!isConfirmed||!value)return;
  spin(true);
  const r=await api('رفض_طلب_تسجيل',{رقم_الطلب:id,سبب_الرفض:value});
  spin(false);
  if(r.نجاح){Swal.fire({icon:'success',title:'تم الرفض',timer:2000,timerProgressBar:true,showConfirmButton:false});renderAdminRequests();}
}

async function approveEdit(id){
  const row=document.getElementById('editRow_'+id);
  if(row){row.style.opacity='.4';}

    row?.remove();

}

  }
}

function filterAdmWarn(circle,search){

async function saveAdmWarn(id,name,circle,threshold,count){
  const sel=document.getElementById('admProc_'+id);
  const val=sel?.value; if(!val)return;
  const done=val==='__done__';
  spin(true);
  await api('تحديث_إجراء_انذار_اداري',{رقم_الطالب:id,اسم_الطالب:name,الحلقة:circle,نوع_الانذار:window._curAdmWarnType,رقم_العتبة:threshold,عدد_المخالفات:count,الإجراء:done?'مكتمل':val,مكتمل:done});
  spin(false);
  Swal.fire({icon:'success',title:'تم التسجيل',timer:1500,timerProgressBar:true,showConfirmButton:false});
  if(done) loadAdmWarnType(window._curAdmWarnType,null);
}

function sendAdmWa(phone,studentName,parentName,threshold,count){
  const tpl=window._curAdmWarnTpl;
  const msg=buildMsg(tpl?.['نص_القالب']||'',{اسم_الطالب:studentName,اسم_ولي_الطالب:parentName,رقم_العتبة:threshold,عدد_الغيابات:count,تاريخ:hijriDate()});
  whatsapp(phone,msg);
}

async function renderAdminAllWarnings(){

    api('جلب_ارشيف_انذارات_ادارية',{}),
  ]);
  const edu=rEdu.انذارات||[];
  const adm=rAdm.انذارات||[];

  // تجميع حسب الطالب
  const byStudent={};
  edu.forEach(ا=>{
    const k=ا['اسم_الطالب']||'؟';
    if(!byStudent[k]) byStudent[k]={name:k,circle:ا['الحلقة']||'—',edu:[],adm_late:[],adm_abs:[],adm_ex:[]};
    byStudent[k].edu.push(ا);
  });
  adm.forEach(ا=>{
    const k=ا['اسم_الطالب']||'؟';
    if(!byStudent[k]) byStudent[k]={name:k,circle:ا['الحلقة']||'—',edu:[],adm_late:[],adm_abs:[],adm_ex:[]};
    if(ا['نوع_الانذار']==='تأخر')         byStudent[k].adm_late.push(ا);
    else if(ا['نوع_الانذار']==='غياب')     byStudent[k].adm_abs.push(ا);
    else if(ا['نوع_الانذار']==='غياب_بعذر') byStudent[k].adm_ex.push(ا);

  window._allWarnData=byStudent;
  window._allWarnCircles=window._studentsCircles||[];
  const mc=document.getElementById('mainContent');
  mc.innerHTML=`
    <div class="section-title"><i class="fas fa-list-check"></i> جميع الإنذارات</div>
    <div class="content-card">
      <div class="card-header-bar">
        <h3><i class="fas fa-table fa-sm me-2"></i>سجل شامل</h3>
        <div class="card-actions">
          <select class="filter-input" id="awFilterCircle" onchange="applyAllWarnFilters()">
            <option value="">كل الحلق</option>
            ${(window._allWarnCircles||[]).map(h=>`<option>${h}</option>`).join('')}

          <input class="filter-input" id="awFilterSearch" placeholder="بحث باسم الطالب…" oninput="applyAllWarnFilters()" style="min-width:140px">
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table class="data-table" id="allWarnTable">
          <thead><tr><th>الطالب</th><th>الحلقة</th><th>إنذارات تأخر</th><th>إنذارات غياب</th><th>غياب بعذر</th><th>إنذارات تعليمية</th></tr></thead>
          <tbody id="allWarnBody">${buildAllWarnRows(Object.values(byStudent))}</tbody>
        </table>
      </div>
    </div>`;
}

function buildAllWarnRows(list){
  if(!list.length) return `<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text-muted)">لا توجد إنذارات</td></tr>`;
  return list.map(s=>`
    <tr>
      <td><strong>${s.name}</strong></td>
      <td>${s.circle}</td>
      <td>${s.adm_late.length?`<span class="badge-pill bp-warning">${s.adm_late.length} إنذار</span>`:'—'}</td>
      <td>${s.adm_abs.length?`<span class="badge-pill bp-danger">${s.adm_abs.length} إنذار</span>`:'—'}</td>
      <td>${s.adm_ex.length?`<span class="badge-pill bp-info">${s.adm_ex.length} إنذار</span>`:'—'}</td>
      <td>${s.edu.length?`<span class="badge-pill bp-danger">${s.edu.length} إنذار · ${s.edu.map(e=>e['سبب_الانذار']||'').join('، ')}</span>`:'—'}</td>
    </tr>`).join('');
}

function filterAllWarn(q){ applyAllWarnFilters(); }
function applyAllWarnFilters(){
  const c=document.getElementById('awFilterCircle')?.value||'';
  const q=document.getElementById('awFilterSearch')?.value||'';
  let list=Object.values(window._allWarnData||{});
  if(c) list=list.filter(s=>s.circle===c);
  if(q) list=list.filter(s=>s.name.includes(q));
  document.getElementById('allWarnBody').innerHTML=buildAllWarnRows(list);
}

      return{الاسم:n,الوظيفة:document.getElementById('nu_role').value,الحلقة:document.getElementById('nu_circle').value,رمز_الدخول:c,رقم_الجوال:document.getElementById('nu_phone').value};
    }
  });
  if(!isConfirmed||!value)return;
  spin(true); await api('إضافة_عامل',value); spin(false); renderSettings();
}

// ══ fix #13: لوحة إحصاءات المدير الشاملة ══
async function renderDirectorDashboard(){
  spin(true,'جارٍ تحميل الإحصاءات الشاملة…');
  const [rAdmin,rEdu,rCircles,rUsers]=await Promise.all([
    api('جلب_تقارير_مشرف_اداري',{}),
    api('جلب_تقارير_مشرف_تعليمي',{}),
    api('جلب_الحلق',{}),
    api('جلب_العاملين',{}),
  ]);
  spin(false);
  const a=rAdmin.تقارير||{};
  const e=rEdu.تقارير||{};
  const حلق=rCircles.حلق||[];
  const عاملون=rUsers.عاملون||[];
  const معلمون=عاملون.filter(u=>u['الوظيفة']==='معلم').length;
  const مشرفين_ت=عاملون.filter(u=>u['الوظيفة']==='مشرف_تعليمي').length;
  const مشرفين_إ=عاملون.filter(u=>u['الوظيفة']==='مشرف_اداري').length;
  const mc=document.getElementById('mainContent');
  mc.innerHTML=`
    <div class="section-title"><i class="fas fa-chart-pie"></i> لوحة إحصاءات المدير الشاملة</div>
    <div class="kpi-grid">
      ${kpiCard('إجمالي الطلاب',a.إجمالي_الطلاب||0,'fa-users','')}
      ${kpiCard('المنتظمون',a.طلاب_منتظمون||0,'fa-user-check','kpi-success')}
      ${kpiCard('الموقوفون',a.طلاب_موقوفون||0,'fa-user-slash','kpi-danger')}
      ${kpiCard('عدد الحلق',حلق.length,'fa-mosque','')}
      ${kpiCard('المعلمون',معلمون,'fa-chalkboard-user','kpi-accent')}
      ${kpiCard('مشرفون تعليميون',مشرفين_ت,'fa-user-tie','')}
      ${kpiCard('مشرفون إداريون',مشرفين_إ,'fa-user-shield','')}
      ${kpiCard('مجموع الأجزاء المحفوظة',e.مجموع_الحفظ||0,'fa-book-open','kpi-accent')}
    </div>
    <div class="section-title mt-2"><i class="fas fa-inbox"></i> الطلبات والانتظار</div>
    <div class="kpi-grid">
      ${kpiCard('طلبات تسجيل جديدة',a.طلبات_جديدة||0,'fa-inbox','kpi-warning')}
      ${kpiCard('قائمة الانتظار',a.طلبات_انتظار||0,'fa-hourglass-half','')}
    </div>
    <div class="section-title mt-2"><i class="fas fa-triangle-exclamation"></i> الإنذارات الإدارية</div>
    <div class="kpi-grid">
      ${kpiCard('تأخر مستحق',a.إنذارات_اداري_تأخر_مستحقة||0,'fa-clock','kpi-danger')}
      ${kpiCard('تأخر مكتمل',a.ارشيف_تأخر||0,'fa-check','kpi-success')}
      ${kpiCard('غياب مستحق',a.إنذارات_اداري_غياب_مستحقة||0,'fa-calendar-xmark','kpi-danger')}
      ${kpiCard('غياب مكتمل',a.ارشيف_غياب||0,'fa-check','kpi-success')}
      ${kpiCard('غياب بعذر مستحق',a.إنذارات_اداري_عذر_مستحقة||0,'fa-calendar-minus','kpi-warning')}
      ${kpiCard('غياب بعذر مكتمل',a.ارشيف_عذر||0,'fa-check','kpi-success')}
    </div>
    <div class="section-title mt-2"><i class="fas fa-book-open"></i> الإنذارات التعليمية</div>
    <div class="kpi-grid">
      ${kpiCard('مفتوحة',e.انذارات_تعليمية_مفتوحة||0,'fa-triangle-exclamation','kpi-danger')}
      ${kpiCard('مكتملة',e.انذارات_تعليمية_مكتملة||0,'fa-check-circle','kpi-success')}
    </div>
    <div class="section-title mt-2"><i class="fas fa-mosque"></i> إحصاءات الحلق</div>
    <div class="kpi-grid">
      ${حلق.map(h=>kpiCard(h['اسم_الحلقة']||'—',h['عدد_الطلاب']||0,'fa-users','')).join('')}
    </div>`;
}

// ══ مساعدات مشتركة ══
function kpiCard(label,val,icon,cls=''){
  return `<div class="kpi-card ${cls}">
    <div class="kpi-label"><i class="fas ${icon} fa-sm"></i> ${label}</div>
    <div class="kpi-val">${val}</div>
    <i class="fas ${icon} bg-icon-float"></i>
  </div>`;
}

function statusBadge(status){
  const map={'منتظم':'bp-success','غير منتظم':'bp-warning','موقوف':'bp-danger','في الانتظار':'bp-info','منسحب':'bp-gray'};
  return `<span class="badge-pill ${map[status]||'bp-gray'}">${status||'—'}</span>`;
}
